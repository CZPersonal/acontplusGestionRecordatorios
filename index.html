<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D61672" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Acontplus Recordatorios" />
    <link rel="manifest" href="/manifest.json" />
    <title>Acontplus Recordatorios</title>
  </head>
  <body>
    <script>
      // Registra el SW kill-switch. Cuando tome control (clients.claim),
      // el evento controllerchange recarga la página para limpiar el estado.
      if ('serviceWorker' in navigator) {
        var _hadCtrl = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.register('/sw.js');
        var _reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (_hadCtrl && !_reloading) { _reloading = true; window.location.reload(); }
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
