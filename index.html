<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D61672" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Acontplus Recordatorios" />
    <link rel="manifest" href="/manifest.json" />
    <title>Acontplus Recordatorios</title>
  </head>
  <body>
    <!-- Limpieza única del SW al cambiar de versión.
         Corre antes de React para rescatar usuarios con cache corrupto. -->
    <script>
      (function () {
        var SW_VER = '3';
        try {
          if (localStorage.getItem('sw_ver') !== SW_VER && 'serviceWorker' in navigator) {
            localStorage.setItem('sw_ver', SW_VER);
            Promise.all([
              navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister(); }));
              }),
              caches.keys().then(function (ns) {
                return Promise.all(ns.map(function (n) { return caches.delete(n); }));
              })
            ]).then(function () { window.location.reload(); });
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
